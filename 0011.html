<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم السرية 🔐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .admin-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="bg-slate-900 p-8 rounded-3xl border border-sky-500/30 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6">🔐 منطقة محظورة</h2>
            <input type="password" id="adminPass" placeholder="اكتب كلمة السر هنا" class="bg-slate-800 border border-slate-700 p-4 rounded-xl w-full text-center mb-4 outline-none focus:border-sky-500">
            <button onclick="checkPass()" class="bg-sky-600 hover:bg-sky-500 px-8 py-3 rounded-xl font-bold w-full transition">دخول</button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-sky-400">رادار الزوار 🛰️</h1>
            <div class="bg-sky-900/30 px-6 py-3 rounded-2xl border border-sky-500/20">
                <span class="text-slate-400 font-bold">إجمالي الزوار: </span>
                <span id="totalCount" class="text-2xl font-black text-white">0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6" id="visitorsList">
            <p class="text-center text-slate-500">جاري سحب البيانات من الرادار...</p>
        </div>
    </div>

    <script>
        // بيانات مشروعك (نفس اللي في الرئيسية)
        const firebaseConfig = {
            apiKey: "AIzaSyD0iYePvgpLp3DD15I5q6FPuhaSP04_R5U",
            databaseURL: "https://epic-mastery-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. التأكد من كلمة السر
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "123") { // غير كلمة السر دي براحتك
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                loadVisitors();
            } else {
                alert("كلمة سر غلط يا بطل!");
            }
        }

        // 2. سحب البيانات من Firebase وعرضها
        function loadVisitors() {
            db.ref('visitors/').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('visitorsList');
                const countDisplay = document.getElementById('totalCount');
                
                list.innerHTML = "";
                if(!data) {
                    list.innerHTML = "<p class='text-center'>مفيش زوار لسه!</p>";
                    return;
                }

                const entries = Object.entries(data).reverse(); // عشان الأحدث يظهر فوق
                countDisplay.innerText = entries.length;

                entries.forEach(([id, info]) => {
                    const card = document.createElement('div');
                    card.className = "admin-card p-6 rounded-2xl";
                    card.innerHTML = `
                        <div class="flex flex-wrap justify-between items-center gap-4">
                            <div>
                                <p class="text-sky-400 font-bold text-sm mb-1">${info.visitTime || 'وقت غير معروف'}</p>
                                <p class="text-white font-bold">${info.platform || 'جهاز غير معروف'} - ${info.screenResolution || ''}</p>
                            </div>
                            <div class="text-left">
                                <p class="text-xs text-slate-500 break-all max-w-xs">${info.userAgent || ''}</p>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
