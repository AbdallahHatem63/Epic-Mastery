<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإنجاز الأسطورية </title>
    <link rel="icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <script type="text/javascript">
    var sc_project=13213380;

    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>

    <script>
        // 2. كود الاختصار السري المطور (000111222) - مضاف حديثاً
        let secretKey = "";
        document.addEventListener('keydown', function(e) {
            // بياخد الرقم اللي دوست عليه بس
            if (/[0-9]/.test(e.key)) {
                secretKey += e.key;
            } else {
                secretKey = ""; // لو دوست أي حرف تاني يصفر العد
            }

            // لو الرقم هو 000111222
            if (secretKey.endsWith("000111222")) {
                window.location.href = "0011.html"; // هيوديك لصفحة الرادار السرية
                secretKey = ""; 
            }
            if (secretKey.length > 20) secretKey = "";
        });
    </script>

    <style>
        :root {
            --epic-primary: #38bdf8; /* أزرق مشع للنسر */
            --epic-secondary: #fbbf24; /* ذهبي ملكي للأسد */
            --bg-dark: #020617;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg-dark); 
            color: #f8fafc; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.05) 0%, transparent 20%);
        }

        /* أنيميشن اللمعان الأسطوري (Epic Shimmer) */
        @keyframes epic-glow {
            0% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2), 0 0 10px rgba(251, 191, 36, 0.1); }
            50% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.5), 0 0 30px rgba(251, 191, 36, 0.3); }
            100% { box-shadow: 0 0 5px rgba(56, 189, 248, 0.2), 0 0 10px rgba(251, 191, 36, 0.1); }
        }

        .epic-glass { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .epic-glass::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .epic-glass:hover::after { left: 120%; }
        .epic-glass:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--epic-primary);
            animation: epic-glow 2s infinite;
        }

        .milestone-node { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #1e293b; transition: all 0.6s; position: relative; }
        .milestone-active { 
            background: var(--epic-primary); 
            border-color: var(--epic-primary); 
            box-shadow: 0 0 15px var(--epic-primary), 0 0 30px var(--epic-primary); 
            transform: scale(1.3);
        }
        .milestone-active::after {
            content: '✓'; position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
            color: var(--epic-primary); font-size: 10px; font-weight: bold;
        }

        input { background: #0f172a !important; border: 1px solid #1e293b !important; padding: 14px; border-radius: 16px; color: white !important; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--epic-primary) !important; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 flex flex-col items-center">
            <img src="imgur.png" alt="شعار النسر والأسد الأسطوري" class="w-48 md:w-64 mb-6 filter drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
            
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 via-white to-amber-400 mb-2 tracking-tighter">لوحة الطالب لإنجاز المناهج</h1>
            <p id="motivationalQuote" class="text-slate-400 font-bold italic text-lg">"جاهز لافتراس الدروس النهاردة؟" ⚔️</p>
        </header>

        <div class="flex flex-wrap gap-3 justify-center mb-10">
            <button onclick="exportData()" class="text-xs bg-slate-800 hover:bg-slate-700 px-5 py-2.5 rounded-full border border-slate-700 transition">📥 نسخ احتياطي (Backup)</button>
            <label class="text-xs bg-slate-800 hover:bg-slate-700 px-5 py-2.5 rounded-full border border-slate-700 cursor-pointer transition">
                📤 استعادة نسخة
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </label>
            <button onclick="clearAllData()" class="text-xs bg-red-900/20 hover:bg-red-900/40 text-red-400 px-5 py-2.5 rounded-full border border-red-900/50 transition">⚠️ مسح كل البيانات</button>
        </div>

        <div class="epic-glass p-6 rounded-[2rem] mb-10 border-sky-500/20 shadow-2xl">
            <div class="flex justify-between mb-4 px-2">
                <span class="text-xs font-black text-sky-400 uppercase tracking-widest">المستوى الحالي</span>
                <span id="levelValue" class="text-xs font-black text-white">0%</span>
            </div>
            <div class="relative h-4 bg-slate-900/50 rounded-full flex justify-between items-center px-2 border border-white/5">
                <div id="globalLine" class="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-600 via-sky-400 to-amber-400 rounded-full transition-all duration-1000 shadow-[0_0_20px_rgba(56,189,248,0.5)]" style="width: 0%"></div>
                <div class="milestone-node z-10" id="m1"></div>
                <div class="milestone-node z-10" id="m2"></div>
                <div class="milestone-node z-10" id="m3"></div>
                <div class="milestone-node z-10" id="m4"></div>
                <div class="milestone-node z-10" id="m5"><span class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] text-sky-300 font-bold">50%</span></div>
                <div class="milestone-node z-10" id="m6"></div>
                <div class="milestone-node z-10" id="m7"></div>
                <div class="milestone-node z-10" id="m8"></div>
                <div class="milestone-node z-10" id="m9"></div>
                <div class="milestone-node z-10" id="m10"></div>
            </div>
        </div>

        <div class="epic-glass p-8 rounded-[2rem] mb-10 border-t-4 border-amber-500/30 shadow-2xl">
            <h3 class="text-xl font-black mb-6 flex items-center gap-3 text-white">
                <span class="bg-amber-500 p-3 rounded-xl text-black">📚</span> 
                افترس مادة جديدة (أقصى 30 درس)
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="text" id="subjectName" placeholder="اسم المادة (مثلاً: تاريخ )">
                <input type="number" id="lessonsCount" placeholder="إجمالي عدد الدروس">
                <button onclick="addNewSubject()" class="bg-gradient-to-r from-amber-600 to-yellow-500 hover:from-amber-500 hover:to-yellow-400 text-black font-black py-4 rounded-2xl transition shadow-lg shadow-amber-900/20 active:scale-95">إضافة التحدي ⚡</button>
            </div>
        </div>

        <div id="statsRow" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12 hidden">
            <div class="epic-glass p-8 rounded-[2.5rem] border-r-8 border-sky-500 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-5 text-7xl italic font-black text-sky-500">LEGEND</div>
                <h2 class="text-slate-400 text-sm font-black uppercase mb-1">القوة الكلية</h2>
                <div class="text-7xl font-black text-white mb-3" id="totalPercentText">0%</div>
                <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden">
                    <div id="totalProgressBar" class="progress-transition h-full bg-sky-500 shadow-[0_0_15px_#38bdf8]" style="width: 0%"></div>
                </div>
            </div>
            <div class="epic-glass p-8 rounded-[2.5rem] border-r-8 border-emerald-500 flex flex-col justify-center">
                <p id="totalLessonsCount" class="text-2xl font-black text-emerald-400 mb-2"></p>
                <p id="rankMessage" class="text-slate-300 font-medium italic text-lg leading-relaxed">"وحش المذاكرة.. متبقي على الختم وقت قليل!" 🔥</p>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20"></div>
    </div>

    <script>
        let mySubjects = JSON.parse(localStorage.getItem('user_subjects_v1')) || {};
        let myProgress = JSON.parse(localStorage.getItem('user_progress_v1')) || {};

        const quotes = [
            "الأسد لا يلتفت خلفه، ركز في هدفك!",
            "حلق كالنسر فوق كل الصعاب الدراسية.",
            "أنت ولدت لتكون بطلاً في قصتك الخاصة.",
            "كل درس بتخلصه هو انتصار في معركتك.",
            "لا تتوقف حتى تفخر بنفسك."
        ];

        function exportData() {
            const data = { subjects: mySubjects, progress: myProgress };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `أسطورة_إنجازالطالب_${new Date().toLocaleDateString('ar-EG')}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    mySubjects = data.subjects || {};
                    myProgress = data.progress || {};
                    saveAndRender();
                    alert("✅ تم استعادة مجدك بنجاح!");
                } catch(err) { alert("❌ ملف غير صالح!"); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm("🚨 هل تريد مسح كل تاريخك؟ لا يفعل هذا إلا الأقوياء الذين سيبدأون ملحمة جديدة!")) {
                mySubjects = {}; myProgress = {}; saveAndRender();
            }
        }

        function celebrate(type) {
            if (type === 'half') {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8', '#fbbf24', '#ffffff'] });
                alert("⭐ وحش! خلصت نص الطريق! كمل يا بطل!");
            } else if (type === 'full') {
                const duration = 5 * 1000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 10, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fbbf24', '#34d399'] });
                    confetti({ particleCount: 10, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fbbf24', '#34d399'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
                alert("🏆 مبروك الختم النهائي! أنت الآن أسطورة!");
            }
        }

        function addNewSubject() {
            const name = document.getElementById('subjectName').value.trim();
            const count = parseInt(document.getElementById('lessonsCount').value);
            if (!name || isNaN(count) || count <= 0) return alert("برجاء إدخال بيانات صحيحة (اسم المادة وعدد الدروس)");
            if (count > 30) return alert("⚠️ كما اتفقنا، لا توجد مادة تزيد عن 30 درساً!");
            mySubjects[name] = count; myProgress[name] = [];
            document.getElementById('subjectName').value = "";
            document.getElementById('lessonsCount').value = "";
            saveAndRender();
        }

        function toggleLesson(sub, index, checked) {
            const oldPerc = calculateTotalPerc();
            if (checked) { if (!myProgress[sub].includes(index)) myProgress[sub].push(index); }
            else { myProgress[sub] = myProgress[sub].filter(i => i !== index); }
            saveAndRender();
            const newPerc = calculateTotalPerc();
            if (oldPerc < 50 && newPerc >= 50) celebrate('half');
            if (oldPerc < 100 && newPerc >= 100) celebrate('full');
        }

        function calculateTotalPerc() {
            let done = 0, total = 0;
            Object.keys(mySubjects).forEach(s => { done += myProgress[s].length; total += mySubjects[s]; });
            return total === 0 ? 0 : Math.round((done / total) * 100);
        }

        function saveAndRender() {
            localStorage.setItem('user_subjects_v1', JSON.stringify(mySubjects));
            localStorage.setItem('user_progress_v1', JSON.stringify(myProgress));
            render();
        }

        function render() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = "";
            const keys = Object.keys(mySubjects);
            document.getElementById('motivationalQuote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

            if (keys.length === 0) {
                dashboard.innerHTML = "<div class='col-span-full text-center py-20 epic-glass rounded-[2rem] border-dashed border-2 border-slate-700 text-slate-500 font-bold'>الميدان فارغ.. أضف مادتك الأولى وابدأ الملحمة الدراسية!</div>";
                document.getElementById('statsRow').classList.add('hidden');
                document.getElementById('levelValue').innerText = "0%";
                document.getElementById('globalLine').style.width = "0%";
                return;
            }

            document.getElementById('statsRow').classList.remove('hidden');
            let doneSum = 0, totalSum = 0;

            keys.forEach(sub => {
                const total = mySubjects[sub];
                const done = myProgress[sub].length;
                doneSum += done; totalSum += total;
                const perc = Math.round((done / total) * 100);

                const card = document.createElement('div');
                card.className = `epic-glass p-7 rounded-[2rem] border-t-4 transition-all duration-500 ${perc === 100 ? 'border-emerald-500' : 'border-sky-500'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6 border-b border-white/5 pb-3">
                        <div>
                            <h4 class="text-2xl font-black text-white tracking-tight">${sub}</h4>
                            <span class="text-sky-400 font-bold text-xs uppercase tracking-tighter">${perc}% تم افتراسه</span>
                        </div>
                        <button onclick="deleteSubject('${sub}')" class="text-red-500/20 hover:text-red-500 transition">🗑️</button>
                    </div>
                    <div class="space-y-1.5 overflow-y-auto max-h-64 pr-2 custom-scroll">
                        ${Array.from({length: total}, (_, i) => i + 1).map(i => {
                            const isDone = myProgress[sub].includes(i);
                            return `
                                <label class="flex items-center space-x-3 space-x-reverse p-2.5 hover:bg-white/5 rounded-2xl cursor-pointer transition">
                                    <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleLesson('${sub}', ${i}, this.checked)" class="w-5 h-5 accent-sky-500">
                                    <span class="text-sm ${isDone ? 'text-slate-500 line-through' : 'text-slate-200 font-bold'}">المهمة ${i}</span>
                                </label>`;
                        }).join('')}
                    </div>
                `;
                dashboard.appendChild(card);
            });

            const totalPerc = calculateTotalPerc();
            document.getElementById('totalPercentText').innerText = totalPerc + "%";
            document.getElementById('totalProgressBar').style.width = totalPerc + "%";
            document.getElementById('levelValue').innerText = totalPerc + "%";
            document.getElementById('totalLessonsCount').innerText = `أتممت سحق ${doneSum} درساً!`;
            
            // تحديث رسالة الرتبة
            const msg = document.getElementById('rankMessage');
            if(totalPerc === 0) msg.innerText = "محارب مبتدئ.. أثبت قوتك وابدأ المذاكرة!";
            else if(totalPerc < 30) msg.innerText = "ذئب منفرد.. بداية جيدة، كمل!";
            else if(totalPerc < 60) msg.innerText = "صقر كاسر.. أنت الآن في منطقة الأمان!";
            else if(totalPerc < 90) msg.innerText = "أسد الميدان.. القمة اقتربت!";
            else msg.innerText = "🏆 أسطورة خالدة.. الشهادة الإعدادية مجرد بداية!";

            // شريط الـ 10 مراحل
            const level = Math.floor(totalPerc / 10);
            document.getElementById('globalLine').style.width = totalPerc + "%";
            for(let i=1; i<=10; i++) {
                const node = document.getElementById('m'+i);
                if (i <= level) node.classList.add('milestone-active');
                else node.classList.remove('milestone-active');
            }
        }

        function deleteSubject(name) {
            if (confirm(`هل تريد التخلي عن مادة "${name}"؟ سيمسح كل تقدمك فيها!`)) { delete mySubjects[name]; delete myProgress[name]; saveAndRender(); }
        }

        render();
    </script>
</body>
</html>
