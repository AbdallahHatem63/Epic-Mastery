<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإنجاز الأسطورية</title>
    <link rel="icon" href="imgur.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <script type="text/javascript">
    var sc_project=13213380; 
    var sc_invisible=1; 
    var sc_security="d9b01777"; 
    </script>
    <script type="text/javascript" src="https://www.statcounter.com/counter/counter.js" async></script>
    <script>
      // كود الاختصار السري لفتح لوحة التحكم (000111222)
      let secretKey = "";
      document.addEventListener('keydown', function(e) {
          secretKey += e.key;
          if (secretKey.includes("000111222")) {
              window.location.href = "admin.html"; // اتأكد إن اسم الملف صح
              secretKey = ""; 
          }
          if (secretKey.length > 20) secretKey = "";
      });
    </script>

    <style>
        :root {
            --epic-primary: #38bdf8;
            --epic-secondary: #fbbf24;
            --bg-dark: #020617;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg-dark); 
            color: #f8fafc; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.05) 0%, transparent 20%);
        }
        .epic-glass { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .epic-glass:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--epic-primary);
        }
        .milestone-node { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #1e293b; transition: all 0.6s; position: relative; }
        input { background: #0f172a !important; border: 1px solid #1e293b !important; padding: 14px; border-radius: 16px; color: white !important; outline: none; width: 100%; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 flex flex-col items-center">
            <img src="imgur.png" alt="Logo" class="w-48 md:w-64 mb-6 filter drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
            <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 via-white to-amber-400 mb-2 tracking-tighter">لوحة الطالب لإنجاز المناهج</h1>
            <p id="motivationalQuote" class="text-slate-400 font-bold italic text-lg">"جاهز لافتراس الدروس النهاردة؟" ⚔️</p>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20"></div>
    </div>

    <script>
        // سكريبت إدارة المواد (addNewSubject, render, الخ)
        let mySubjects = JSON.parse(localStorage.getItem('user_subjects_v1')) || {};
        function render() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = "";
            Object.keys(mySubjects).forEach(sub => {
                const data = mySubjects[sub];
                const card = document.createElement('div');
                card.className = "epic-glass p-7 rounded-[2rem] border-sky-500/20 flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="text-2xl font-black text-white">${sub}</h4>
                        </div>
                        <p class="text-slate-400 mb-4 font-bold">عدد الدروس الإجمالي: ${data.total}</p>
                    </div>
                `;
                dashboard.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
