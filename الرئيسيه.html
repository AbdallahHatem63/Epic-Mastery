<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الإنجاز الأسطورية</title>
    <link rel="icon" href="imgur.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
      // بيانات مشروعك الحقيقية
      const firebaseConfig = {
        apiKey: "AIzaSyD0iYePvgpLp3DD15I5q6FPuhaSP04_R5U",
        authDomain: "epic-mastery.firebaseapp.com",
        projectId: "epic-mastery",
        storageBucket: "epic-mastery.firebasestorage.app",
        messagingSenderId: "726242730245",
        appId: "1:726242730245:web:6f0a35ab0bcbc f0b5a976c",
        databaseURL: "https://epic-mastery-default-rtdb.firebaseio.com/" 
      };
      
      if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
      }

      // كود الرادار - شغال في السر هنا
      window.onload = function() {
          const deviceData = {
              userAgent: navigator.userAgent,
              platform: navigator.platform,
              screenResolution: `${window.screen.width}x${window.screen.height}`,
              visitTime: new Date().toLocaleString('ar-EG'),
              language: navigator.language
          };
          // إرسال البيانات فوراً للـ Firebase
          firebase.database().ref('visitors/').push(deviceData);
      };
    </script>

    <style>
        :root {
            --epic-primary: #38bdf8;
            --epic-secondary: #fbbf24;
            --bg-dark: #020617;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg-dark); 
            color: #f8fafc; 
            min-height: 100vh; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.05) 0%, transparent 20%);
        }

        .epic-glass { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .epic-glass:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--epic-primary);
        }

        .milestone-node { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #1e293b; transition: all 0.6s; position: relative; }
        .milestone-active { 
            background: var(--epic-primary); 
            box-shadow: 0 0 15px var(--epic-primary); 
            transform: scale(1.3);
        }

        input { background: #0f172a !important; border: 1px solid #1e293b !important; padding: 14px; border-radius: 16px; color: white !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10 flex flex-col items-center">
            <img src="imgur.png" alt="شعار النسر والأسد" class="w-48 md:w-64 mb-6 filter drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 via-white to-amber-400 mb-2 tracking-tighter">لوحة الطالب لإنجاز المناهج</h1>
            <p id="motivationalQuote" class="text-slate-400 font-bold italic text-lg">"جاهز لافتراس الدروس النهاردة؟" ⚔️</p>
        </header>

        <div class="epic-glass p-6 rounded-[2rem] mb-10 border-sky-500/20 shadow-2xl">
            <div class="flex justify-between mb-4 px-2">
                <span class="text-xs font-black text-sky-400 uppercase tracking-widest">المستوى الحالي</span>
                <span id="levelValue" class="text-xs font-black text-white">0%</span>
            </div>
            <div class="relative h-4 bg-slate-900/50 rounded-full flex justify-between items-center px-2 border border-white/5">
                <div id="globalLine" class="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-600 via-sky-400 to-amber-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                <div class="milestone-node z-10" id="m1"></div>
                <div class="milestone-node z-10" id="m2"></div>
                <div class="milestone-node z-10" id="m3"></div>
                <div class="milestone-node z-10" id="m4"></div>
                <div class="milestone-node z-10" id="m5"></div>
                <div class="milestone-node z-10" id="m6"></div>
                <div class="milestone-node z-10" id="m7"></div>
                <div class="milestone-node z-10" id="m8"></div>
                <div class="milestone-node z-10" id="m9"></div>
                <div class="milestone-node z-10" id="m10"></div>
            </div>
        </div>

        <div class="epic-glass p-8 rounded-[2rem] mb-10 border-t-4 border-amber-500/30">
            <h3 class="text-xl font-black mb-6 flex items-center gap-3 text-white">
                <span class="bg-amber-500 p-3 rounded-xl text-black">📚</span> 
                افترس مادة جديدة
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="text" id="subjectName" placeholder="اسم المادة">
                <input type="number" id="lessonsCount" placeholder="إجمالي الدروس">
                <button onclick="addNewSubject()" class="bg-gradient-to-r from-amber-600 to-yellow-500 hover:from-amber-500 text-black font-black py-4 rounded-2xl transition active:scale-95">إضافة التحدي ⚡</button>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20"></div>
    </div>

    <script>
        // هنا الكود الخاص بلوحة الإنجاز بتاعك (addNewSubject, render, إلخ)
        let mySubjects = JSON.parse(localStorage.getItem('user_subjects_v1')) || {};
        let myProgress = JSON.parse(localStorage.getItem('user_progress_v1')) || {};

        function addNewSubject() {
            const name = document.getElementById('subjectName').value.trim();
            const count = parseInt(document.getElementById('lessonsCount').value);
            if (!name || isNaN(count)) return;
            mySubjects[name] = count; 
            myProgress[name] = [];
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('user_subjects_v1', JSON.stringify(mySubjects));
            localStorage.setItem('user_progress_v1', JSON.stringify(myProgress));
            render();
        }

        function render() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = "";
            Object.keys(mySubjects).forEach(sub => {
                const card = document.createElement('div');
                card.className = "epic-glass p-7 rounded-[2rem] border-sky-500";
                card.innerHTML = `<h4 class="text-2xl font-black text-white">${sub}</h4><p class="text-slate-400">عدد الدروس: ${mySubjects[sub]}</p>`;
                dashboard.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
